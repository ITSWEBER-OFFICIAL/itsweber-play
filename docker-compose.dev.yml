# Dev-Stack (lokales Windows/Mac, Bridge-Network, Ports lokal exponiert)
# Hot-Reload via bind-mount der apps/.
# Start: `make dev` oder `docker compose -f docker-compose.dev.yml up`.
# Dieser File ist standalone — KEIN Overlay auf docker-compose.yml (die
# Prod-Variante macht macvlan/br1, was auf Windows/Mac nicht existiert).

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  play-web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports: ["3000:3000"]
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
    env_file: .env
    depends_on:
      play-api:
        condition: service_healthy
    logging: *default-logging

  play-migrate:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: "no"
    env_file: .env
    working_dir: /app
    command: >
      sh -c "pnpm --filter @play/db exec prisma migrate deploy --schema prisma/schema.prisma"
    depends_on:
      play-postgres:
        condition: service_healthy
    logging: *default-logging

  play-api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    ports: ["4000:4000"]
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
    env_file: .env
    depends_on:
      play-migrate:
        condition: service_completed_successfully
      play-postgres:
        condition: service_healthy
      play-redis:
        condition: service_healthy
      play-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  play-worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    init: true
    volumes:
      - ./apps/worker:/app/apps/worker
    env_file: .env
    depends_on:
      play-migrate:
        condition: service_completed_successfully
      play-redis:
        condition: service_healthy
      play-minio:
        condition: service_healthy
    logging: *default-logging

  play-postgres:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes: ["./.volumes/postgres:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging

  play-redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["./.volumes/redis:/data"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    logging: *default-logging

  play-minio:
    image: minio/minio:RELEASE.2026-01-07T22-48-43Z
    ports: ["9000:9000", "9001:9001"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
    volumes: ["./.volumes/minio:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
