<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="28" fill="#0A1A26"/>
  <defs>
    <linearGradient id="play-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5DEDA0"/>
      <stop offset="100%" stop-color="#3FE48B"/>
    </linearGradient>
    <filter id="play-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Atom orbits -->
  <g transform="translate(64 64)" fill="none" stroke="#3FE48B" stroke-width="2" opacity="0.85">
    <ellipse rx="44" ry="18" transform="rotate(0)"/>
    <ellipse rx="44" ry="18" transform="rotate(60)"/>
    <ellipse rx="44" ry="18" transform="rotate(120)"/>
  </g>
  <!-- 5 ITSWEBER-Mindmap nodes -->
  <g fill="#3FE48B">
    <circle cx="108" cy="64" r="3.5"/>
    <circle cx="42" cy="25" r="3.5"/>
    <circle cx="42" cy="103" r="3.5"/>
    <circle cx="86" cy="25" r="3.5"/>
    <circle cx="86" cy="103" r="3.5"/>
  </g>
  <!-- Glowing play core -->
  <g filter="url(#play-glow)">
    <circle cx="64" cy="64" r="20" fill="url(#play-grad)"/>
  </g>
  <path d="M58 52 L58 76 L80 64 Z" fill="#0A1A26"/>
</svg>
