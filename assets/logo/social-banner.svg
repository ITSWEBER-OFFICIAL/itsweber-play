<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1A26"/>
      <stop offset="55%" stop-color="#102838"/>
      <stop offset="100%" stop-color="#1B3F50"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="18%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#3FE48B" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3FE48B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="play-grad-b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5DEDA0"/>
      <stop offset="100%" stop-color="#3FE48B"/>
    </linearGradient>
    <filter id="bg-play-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg-grad)"/>
  <rect width="1280" height="640" fill="url(#bg-glow)"/>

  <!-- Icon groß links -->
  <g transform="translate(120 200) scale(2.0)">
    <g transform="translate(64 64)" fill="none" stroke="#3FE48B" stroke-width="2" opacity="0.85">
      <ellipse rx="44" ry="18" transform="rotate(0)"/>
      <ellipse rx="44" ry="18" transform="rotate(60)"/>
      <ellipse rx="44" ry="18" transform="rotate(120)"/>
    </g>
    <g fill="#3FE48B">
      <circle cx="108" cy="64" r="3.5"/>
      <circle cx="42" cy="25" r="3.5"/>
      <circle cx="42" cy="103" r="3.5"/>
      <circle cx="86" cy="25" r="3.5"/>
      <circle cx="86" cy="103" r="3.5"/>
    </g>
    <g filter="url(#bg-play-glow)">
      <circle cx="64" cy="64" r="20" fill="url(#play-grad-b)"/>
    </g>
    <path d="M58 52 L58 76 L80 64 Z" fill="#0A1A26"/>
  </g>

  <!-- Text rechts -->
  <text x="500" y="290" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="88" font-weight="800" letter-spacing="-2.5" fill="#F0F6F9">ITSWEBER</text>
  <text x="500" y="386" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="88" font-weight="800" letter-spacing="-2.5" fill="#3FE48B">Play</text>
  <text x="504" y="438" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="22" fill="#A8C9D5">Die Video-Plattform mit Atom-DNA.</text>
  <text x="504" y="470" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="22" fill="#A8C9D5">Self-hosted. Open Source. 100 % dir.</text>
  <text x="506" y="540" font-family="ui-monospace, 'SF Mono', Consolas, monospace"
        font-size="16" letter-spacing="4" fill="#3FE48B">POWERED BY ITSWEBER · ITSWEBER.DE</text>
</svg>
