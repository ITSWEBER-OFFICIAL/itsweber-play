<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="wm-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5DEDA0"/>
      <stop offset="100%" stop-color="#3FE48B"/>
    </linearGradient>
    <filter id="wm-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Icon left -->
  <g transform="translate(20 36)">
    <g transform="translate(64 64)" fill="none" stroke="#3FE48B" stroke-width="2" opacity="0.85">
      <ellipse rx="44" ry="18" transform="rotate(0)"/>
      <ellipse rx="44" ry="18" transform="rotate(60)"/>
      <ellipse rx="44" ry="18" transform="rotate(120)"/>
    </g>
    <g fill="#3FE48B">
      <circle cx="108" cy="64" r="3.5"/>
      <circle cx="42" cy="25" r="3.5"/>
      <circle cx="42" cy="103" r="3.5"/>
      <circle cx="86" cy="25" r="3.5"/>
      <circle cx="86" cy="103" r="3.5"/>
    </g>
    <g filter="url(#wm-glow)">
      <circle cx="64" cy="64" r="20" fill="url(#wm-grad)"/>
    </g>
    <path d="M58 52 L58 76 L80 64 Z" fill="#0A1A26"/>
  </g>
  <!-- Wordmark right -->
  <text x="176" y="115" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="64" font-weight="800" letter-spacing="-1.5" fill="#F0F6F9">ITSWEBER <tspan fill="#3FE48B">Play</tspan></text>
  <text x="178" y="150" font-family="ui-monospace, 'SF Mono', Consolas, monospace"
        font-size="14" letter-spacing="3.5" fill="#7AA9BA">POWERED BY ITSWEBER</text>
</svg>
