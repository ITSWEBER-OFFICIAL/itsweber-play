user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # vtt fehlt in bookworm mime.types — nachrüsten. m3u8/ts sind drin.
    types {
        text/vtt vtt;
    }

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # Big uploads (siehe MAX_UPLOAD_SIZE_MB=8192 in .env)
    client_max_body_size 8g;
    client_body_timeout 600s;
    send_timeout 600s;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    log_format play '$remote_addr "$request" $status $bytes_sent "$http_referer" "$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log play;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/vnd.apple.mpegurl;

    include /etc/nginx/conf.d/*.conf;
}
