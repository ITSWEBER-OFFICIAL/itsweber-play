# Port-Multiplexer für ITSWEBER Play:
#   /           → Next.js Web (127.0.0.1:3001)
#   /api/*      → Fastify API (127.0.0.1:4000/api/*) — KEIN Strip, Backend
#                 mountet alles unter /api/* (Auth, Upload, Studio, tRPC).
#   /s3/*       → MinIO       (127.0.0.1:9000/*) — Prefix wird gestript
#   /health     → 200 OK (Docker Healthcheck)
#
# Same-origin-Setup: Browser-Requests gehen alle an Port 3000, Nginx
# routet intern. Das erspart CORS und macht Auth-Cookies einfacher.

upstream play_web   { server 127.0.0.1:3001; keepalive 16; }
upstream play_api   { server 127.0.0.1:4000; keepalive 16; }
upstream play_minio { server 127.0.0.1:9000; keepalive 16; }

server {
    listen 3000 default_server;
    listen [::]:3000 default_server;

    # Container-Healthcheck (entkoppelt von App-Readiness)
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Alle API-Routen (Auth, Upload, Studio, tRPC) sind backend-seitig unter
    # /api/* gemountet. proxy_pass ohne URI gibt den vollen Original-Pfad weiter.
    location /api/ {
        proxy_pass http://play_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
        proxy_request_buffering off;            # Stream-Uploads bis 8 GB

        # SSE (theme-bus /api/theme/events)
        proxy_buffering off;
    }

    # MinIO public-read buckets (HLS, Thumbs, Avatars, Banners)
    # Nested regex-locations dürfen keinen proxy_pass-URI haben → wir nutzen
    # rewrite, damit der /s3/-Prefix vor dem Backend-Hop verschwindet. Sonst
    # interpretiert MinIO "s3" als Bucket-Namen → InvalidBucketName 400.
    location /s3/ {
        rewrite ^/s3/(.*)$ /$1 break;
        proxy_pass http://play_minio;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # HLS-Chunks cachbar für CDN/NPM — Playlist NICHT (wird nachgeladen)
        location ~* \.ts$ {
            rewrite ^/s3/(.*)$ /$1 break;
            proxy_pass http://play_minio;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
        location ~* \.m3u8$ {
            rewrite ^/s3/(.*)$ /$1 break;
            proxy_pass http://play_minio;
            add_header Cache-Control "no-cache";
        }
    }

    # Next.js Web (Root) — WebSocket-Support für HMR / live features
    location / {
        proxy_pass http://play_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
